            {id: 65, label: "SEC-011 Streaming Validation", category: "Technical", description: "Streaming response validation coverage increased from 80% to 100%, ensuring all streaming endpoints are security-validated", tags: ["security", "streaming", "validation", "testing", "coverage", "production"], impact: "Closes security gap in streaming endpoints that could bypass standard request validation"},
            {id: 66, label: "Audio Feedback Developer Loop", category: "Tool & Workflow", description: "Webhook audio tracker with .wav file playback provides real-time audio cues for development events like task completion, errors, and builds", tags: ["developer-experience", "audio", "feedback", "workflow", "mcp", "productivity"], impact: "Ambient awareness of build/deploy status without constant terminal monitoring"},
            {id: 67, label: "Ghidra Production Hardening", category: "Technical", description: "Binary analysis tooling (GhidraGo plugin, Ghidra-as-a-Service) hardened for production use with improved reliability and configuration", tags: ["ghidra", "reverse-engineering", "production", "hardening", "security", "tooling"], impact: "Enables reliable automated binary analysis in production workflows"}
        ];

        // Category colors
        const categoryColors = {
            "Technical": "#f093fb",
            "Tool & Workflow": "#4facfe",
            "Documentation": "#43e97b",
            "Problem-Solving": "#fa709a",
            "Methodology": "#feca57"
        };

        // Create nodes and edges
        let nodes = new vis.DataSet([
            {id: 0, label: "Key Insights\n(67)", shape: "box", color: {background: "#667eea", border: "#5568d3"}, font: {color: "white", size: 20, bold: true}, size: 40}
        ]);

        let edges = new vis.DataSet([]);

        // Add category nodes
        let categoryId = 100;
        const categoryNodes = {};
        Object.keys(categoryColors).forEach(cat => {
            nodes.add({
                id: categoryId,
                label: cat,
                shape: "ellipse",
                color: {background: categoryColors[cat], border: categoryColors[cat]},
                font: {size: 16, bold: true},
                size: 30
            });
            categoryNodes[cat] = categoryId;
            edges.add({from: 0, to: categoryId, width: 3, color: {color: categoryColors[cat], opacity: 0.6}});
            categoryId++;
        });

        // Add insight nodes
        insights.forEach(insight => {
            nodes.add({
                id: insight.id,
                label: `#${insight.id}\n${insight.label}`,
                title: insight.description,
                shape: "dot",
                color: {background: categoryColors[insight.category], border: "#333"},
                font: {size: 12},
                size: 20,
                data: insight
            });
            edges.add({
                from: categoryNodes[insight.category],
                to: insight.id,
                color: {color: categoryColors[insight.category], opacity: 0.3},
                width: 1
            });
        });

        // Create network
        const container = document.getElementById("mynetwork");
        const data = {nodes: nodes, edges: edges};
        const options = {
            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -8000,
                    centralGravity: 0.3,
                    springLength: 150,
                    springConstant: 0.04,
                    damping: 0.09,
                    avoidOverlap: 0.5
                },
                stabilization: {
                    iterations: 1000
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 100,
                zoomView: true,
                dragView: true
            },
            nodes: {
                borderWidth: 2,
                shadow: true
            },
            edges: {
                smooth: {
                    type: "continuous"
                }
            }
        };

        const network = new vis.Network(container, data, options);

        // Click handler to show details
        network.on("click", function(params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const node = nodes.get(nodeId);

                if (node.data) {
                    showDetails(node.data);
                }
            }
        });

        function showDetails(insight) {
            const panel = document.getElementById("detail-panel");
            document.getElementById("detail-title").textContent = `Insight #${insight.id}: ${insight.label}`;
            document.getElementById("detail-category").textContent = `Category: ${insight.category}`;
            document.getElementById("detail-description").textContent = insight.description;
            document.getElementById("detail-impact").innerHTML = `<strong>Impact:</strong> ${insight.impact}`;
            document.getElementById("detail-tags").innerHTML = `<strong>Tags:</strong> ${insight.tags.map(t => `<span class="tag">#${t}</span>`).join(' ')}`;
            panel.classList.add("visible");
        }

        // Search functionality
        document.getElementById("searchBox").addEventListener("input", function(e) {
            const searchTerm = e.target.value.toLowerCase();

            if (searchTerm === "") {
                nodes.forEach(node => {
                    nodes.update({id: node.id, hidden: false});
                });
                edges.forEach(edge => {
                    edges.update({id: edge.id, hidden: false});
                });
                return;
            }

            insights.forEach(insight => {
                const matches =
                    insight.label.toLowerCase().includes(searchTerm) ||
                    insight.description.toLowerCase().includes(searchTerm) ||
                    insight.tags.some(tag => tag.includes(searchTerm)) ||
                    insight.category.toLowerCase().includes(searchTerm);

                nodes.update({id: insight.id, hidden: !matches});
            });
        });

        // Filter by category
        function filterByCategory(category) {
            // Update button states
            document.querySelectorAll('.filter-group .filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (category === 'all') {
                insights.forEach(insight => {
                    nodes.update({id: insight.id, hidden: false});
                });
                return;
            }

            insights.forEach(insight => {
                nodes.update({id: insight.id, hidden: insight.category !== category});
            });
        }

        // Filter by tag
        function filterByTag(tag) {
            event.target.classList.toggle('active');
            const activeTags = Array.from(document.querySelectorAll('#tagFilters .filter-btn.active'))
                .map(btn => btn.textContent.trim());

            if (activeTags.length === 0) {
                insights.forEach(insight => {
                    nodes.update({id: insight.id, hidden: false});
                });
                return;
            }

            insights.forEach(insight => {
                const matches = activeTags.some(t => insight.tags.includes(t));
                nodes.update({id: insight.id, hidden: !matches});
            });
        }

        // Reset view
        function resetView() {
            // Clear search
            document.getElementById("searchBox").value = "";

            // Clear filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show all nodes
            nodes.forEach(node => {
                nodes.update({id: node.id, hidden: false});
            });
            edges.forEach(edge => {
                edges.update({id: edge.id, hidden: false});
            });

            // Hide detail panel
            document.getElementById("detail-panel").classList.remove("visible");

            // Reset view
            network.fit();
        }

        // Initial fit
        network.once("stabilizationIterationsDone", function() {
            network.fit();
        });
    </script>
</body>
</html>
